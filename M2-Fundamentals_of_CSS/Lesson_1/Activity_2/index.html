<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS</title>

    <!-- Internal CSS: Add style tags inside the head tag and write CSS code inside it -->
     <style>
      /* Add CSS code here */
      body {
        background-color: lightblue;
      }

      h1 {
        color: navy;
        text-align: center;
      }

      #my-card {
        background-color: white;
        border: 2px solid black;
        padding: 20px;
        margin: 20px;
      }

      .my-detail {
        font-size: 18px;
        color: darkred;
      }
    </style>

  </head>
  <body>

    <h1>My Colour Card</h1>

    

    <div id="my-card">

      <h2>About Me</h2>
      <p class="my-detail">My name is Sam.</p>
      <p class="my-detail">My favourite colour is red.</p>
      <p class="my-detail">My favourite subject is Maths.</p>
      <p class="my-detail">My favourite food is pasta.</p>

    </div>

    <h2>My Favourite Things</h2>
    <p>My favourite animal is a cat.</p>
    <p>My favourite sport is cricket.</p>
    <p>My favourite movie is The Lion King.</p>

  </body>
</html>
