<html>
<head>
  <title>Text Decoration</title>
</head>
<body>

<div class="map-title">Map Title</div>
<div class="captains-warning">Captain's Warning</div>
<div class="fake-location">Fake Location</div>
<div class="real-location">Real Location</div>

</body>
</html>

<style>
.fake-location {
  text-decoration: line-through;
  color: #999999;
}

.real-location {
  text-decoration: underline;
  text-decoration-color: #c8a000;
  text-decoration-thickness: 3px;
  font-weight: bold;
}
.map-title {
  text-transform: uppercase;
  letter-spacing: 3px;
}

.captains-warning {
  font-variant: small-caps;
  color: #8B0000;
}
