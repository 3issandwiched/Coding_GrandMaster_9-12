<html>
<head>
  <title>Transforms</title>
</head>
<body>

<div class="map-title">Map Title</div>
<div class="captains-warning">Captain's Warning</div>
<div class="ferris-wheel">Ferris Wheel</div>
<div class="tent">Tent</div>
<div class="ticket-booth">Ticket Booth</div>

</body>
</html>

<style>
.map-title {
  text-transform: uppercase;
  letter-spacing: 3px;
}

.captains-warning {
  font-variant: small-caps;
  color: #8B0000;
}
.ferris-wheel {
  transform: rotate(45deg);
}

.tent {
  transform: scale(1.4);
}

.ticket-booth {
  transform: rotate(-10deg);
}
</style>
