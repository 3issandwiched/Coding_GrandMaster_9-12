<html>
<head>
  <title>Text Shadow and text indent</title>
</head>
<body>

<div class="neon-title">Neon Title</div>
<div class="glow-card">Glow Card</div>
<div class="score-box">Score Box</div>
<div class="description">Description is good</div>

</body>
</html>

<style>.neon-title {
  color: #ff00ff;
  text-shadow:
    0 0 10px #ff00ff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}
.glow-card {
  box-shadow:
    0 0 15px #00ffff,
    0 0 30px #00ffff;
}

.score-box {
  box-shadow: 4px 4px 0px #ffd700;
}
.description {
  text-indent: 30px;
  color: #cccccc;
  font-size: 15px;
  line-height: 1.9;
}
