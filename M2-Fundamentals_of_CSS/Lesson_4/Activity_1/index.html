<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Active vs Disabled Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #f4f4f9;
    }

    .btn-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    /* Base button styles */
    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    /* 1. Normal/Enabled Button Styling */
    .primary-btn {
      background-color: #007bff;
      color: white;
    }

    .primary-btn:hover {
      background-color: #0056b3; /* Darker blue on hover */
    }

    /* THE :ACTIVE STATE - Triggers ONLY while pressing down */
    .primary-btn:active {
      background-color: #004085; /* Deep blue when clicked */
      transform: scale(0.95);    /* Shrinks slightly to look "pressed" */
    }

    /* 2. THE :DISABLED STATE - Triggers when the disabled attribute is present */
    button:disabled {
      background-color: #cccccc;
      color: #666666;
      cursor: not-allowed;       /* Changes cursor to a red circle with a slash */
      transform: none;           /* Prevents any movement if clicked */
      box-shadow: none;
    }
  </style>
</head>
<body>

  <h1>CSS States Demo</h1>
  <p>Click and hold the blue button to see <strong>:active</strong>. Try interacting with the gray button to see <strong>:disabled</strong>.</p>

  <div class="btn-container">
    <!-- This button is active and interactive -->
    <button class="primary-btn">Click Me (:active)</button>

    <!-- This button uses the HTML disabled attribute -->
    <button class="primary-btn" disabled>Locked (:disabled)</button>
  </div>

</body>
</html>
